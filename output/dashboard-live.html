<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ärztehaus Radar - Live Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.1em;
            color: #667eea;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .content {
            padding: 40px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 25px;
            border-radius: 8px;
            text-align: center;
            border-left: 4px solid #667eea;
        }

        .stat-card.high {
            border-left-color: #10b981;
            background: linear-gradient(135deg, #ecfdf5 0%, #d1fae5 100%);
        }

        .stat-card.medium {
            border-left-color: #f59e0b;
            background: linear-gradient(135deg, #fffbeb 0%, #fef3c7 100%);
        }

        .stat-card.low {
            border-left-color: #ef4444;
            background: linear-gradient(135deg, #fef2f2 0%, #fee2e2 100%);
        }

        .stat-number {
            font-size: 2.5em;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
        }

        .stat-card.high .stat-number { color: #10b981; }
        .stat-card.medium .stat-number { color: #f59e0b; }
        .stat-card.low .stat-number { color: #ef4444; }

        .stat-label {
            font-size: 0.95em;
            color: #4b5563;
            font-weight: 500;
        }

        section {
            margin-bottom: 40px;
        }

        h2 {
            color: #667eea;
            font-size: 1.8em;
            margin-bottom: 20px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .lead-card {
            background: #f9fafb;
            border-left: 4px solid #667eea;
            padding: 25px;
            margin-bottom: 20px;
            border-radius: 8px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .lead-card:hover {
            transform: translateX(5px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.15);
        }

        .lead-card.high {
            border-left-color: #10b981;
            background: linear-gradient(to right, #ecfdf5, #f9fafb);
        }

        .lead-card.medium {
            border-left-color: #f59e0b;
            background: linear-gradient(to right, #fffbeb, #f9fafb);
        }

        .lead-card.low {
            border-left-color: #ef4444;
            background: linear-gradient(to right, #fef2f2, #f9fafb);
        }

        .lead-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
        }

        .lead-title {
            font-size: 1.3em;
            font-weight: bold;
            color: #1f2937;
            margin-bottom: 5px;
        }

        .lead-meta {
            font-size: 0.9em;
            color: #6b7280;
        }

        .lead-quality {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .quality-high {
            background: #d1fae5;
            color: #065f46;
        }

        .quality-medium {
            background: #fef3c7;
            color: #92400e;
        }

        .quality-low {
            background: #fee2e2;
            color: #7f1d1d;
        }

        .lead-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin: 15px 0;
        }

        .detail-item {
            padding: 10px;
            background: rgba(255,255,255,0.5);
            border-radius: 4px;
        }

        .detail-label {
            font-size: 0.8em;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }

        .detail-value {
            font-size: 1.1em;
            font-weight: bold;
            color: #1f2937;
        }

        .reasoning {
            background: rgba(255,255,255,0.7);
            padding: 12px;
            border-radius: 4px;
            font-style: italic;
            color: #4b5563;
            border-left: 2px solid #667eea;
            margin-top: 12px;
        }

        footer {
            background: #f9fafb;
            padding: 20px 40px;
            text-align: center;
            color: #6b7280;
            font-size: 0.9em;
            border-top: 1px solid #e5e7eb;
        }

        .refresh-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
            transition: background 0.2s;
        }

        .refresh-btn:hover {
            background: #764ba2;
        }

        .error {
            background: #fee2e2;
            color: #991b1b;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }

        @media (max-width: 768px) {
            header {
                padding: 20px;
            }

            h1 {
                font-size: 1.8em;
            }

            .content {
                padding: 20px;
            }

            .lead-header {
                flex-direction: column;
            }

            .lead-quality {
                margin-top: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Ärztehaus Radar</h1>
            <p class="subtitle">AI-Native Medical Building Discovery for meinphysio+</p>
        </header>

        <div class="content" id="content">
            <div class="loading">
                <div class="spinner"></div>
                <p>Loading leads from CSV...</p>
            </div>
        </div>

        <footer id="footer">
            <p>Ärztehaus Radar MVP • Live Data from leads.csv</p>
        </footer>
    </div>

    <script>
        // Fetch leads data from API
        async function loadLeads() {
            try {
                const response = await fetch('/api/leads');
                if (!response.ok) throw new Error('Failed to load leads');

                const data = await response.json();
                renderDashboard(data);
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('content').innerHTML = `
                    <div class="error">
                        <p><strong>Error loading data:</strong> ${error.message}</p>
                        <p>Make sure the server is running: <code>python server.py</code></p>
                    </div>
                `;
            }
        }

        function renderDashboard(data) {
            const leads = data.leads;
            const stats = {
                total: data.total,
                high: data.high,
                medium: data.medium,
                low: data.low
            };

            // Organize by quality
            const highLeads = leads.filter(l => l['Lead Quality'] === 'high');
            const mediumLeads = leads.filter(l => l['Lead Quality'] === 'medium');
            const lowLeads = leads.filter(l => l['Lead Quality'] === 'low');

            let html = `
                <section>
                    <h2>Overview</h2>
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-number">${stats.total}</div>
                            <div class="stat-label">Projects Analyzed</div>
                        </div>
                        <div class="stat-card high">
                            <div class="stat-number">${stats.high}</div>
                            <div class="stat-label">High Quality Leads</div>
                        </div>
                        <div class="stat-card medium">
                            <div class="stat-number">${stats.medium}</div>
                            <div class="stat-label">Medium Quality</div>
                        </div>
                        <div class="stat-card low">
                            <div class="stat-number">${stats.low}</div>
                            <div class="stat-label">Low Quality</div>
                        </div>
                    </div>
                </section>

                <section>
                    <h2>⭐ High Quality Leads (Immediate Action)</h2>
                    ${highLeads.length > 0 ? highLeads.map(lead => createLeadCard(lead, 'high')).join('') : '<p>No high-quality leads</p>'}
                </section>

                <section>
                    <h2>✓ Medium Quality Leads (Monitor & Engage)</h2>
                    ${mediumLeads.length > 0 ? mediumLeads.map(lead => createLeadCard(lead, 'medium')).join('') : '<p>No medium-quality leads</p>'}
                </section>

                <section>
                    <h2>Low Quality Leads</h2>
                    ${lowLeads.length > 0 ? lowLeads.map(lead => createLeadCard(lead, 'low')).join('') : '<p>No low-quality leads</p>'}
                </section>

                <button class="refresh-btn" onclick="location.reload()">Refresh Data</button>
            `;

            document.getElementById('content').innerHTML = html;
            document.getElementById('footer').innerHTML = `
                <p>Ärztehaus Radar MVP • Live Data from leads.csv (${new Date().toLocaleString()})</p>
                <p style="font-size: 0.85em; margin-top: 10px;">Data updates automatically when leads.csv is regenerated</p>
            `;
        }

        function createLeadCard(lead, quality) {
            const qualityClass = `quality-${quality}`;
            return `
                <div class="lead-card ${quality}">
                    <div class="lead-header">
                        <div>
                            <div class="lead-title">${lead.Name}</div>
                            <div class="lead-meta">${lead.City} • ${lead.Source}</div>
                        </div>
                        <span class="lead-quality ${qualityClass}">${lead['Lead Quality']}</span>
                    </div>
                    <div class="lead-details">
                        <div class="detail-item">
                            <div class="detail-label">Confidence</div>
                            <div class="detail-value">${lead['Confidence (%)']}%</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Suitability</div>
                            <div class="detail-value">${lead['Physio Suitability (1-5)']}/5</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Ground Floor</div>
                            <div class="detail-value">${lead['Ground Floor']}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Est. Size (sqm)</div>
                            <div class="detail-value">${lead['Est. Size (sqm)']}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Stage</div>
                            <div class="detail-value">${lead['Estimated Stage']}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Accessibility</div>
                            <div class="detail-value">${lead.Accessibility}</div>
                        </div>
                    </div>
                    <div class="reasoning">
                        "${lead.Reasoning}"
                    </div>
                </div>
            `;
        }

        // Load data when page loads
        document.addEventListener('DOMContentLoaded', loadLeads);
    </script>
</body>
</html>
